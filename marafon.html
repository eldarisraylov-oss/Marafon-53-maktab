
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maktab Marafoni Portali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-btn { background-color: #eef2ff !important; color: #4338ca !important; border-color: #c7d2fe !important; }
        th, td { border: 1px solid #e2e8f0; text-align: center; padding: 8px; }
        th { background-color: #f8fafc; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-indigo-700 text-white p-6 shadow-md relative">
        <a href="index.html" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/30 p-2 rounded-lg text-sm flex items-center transition-all">
            <i class="fas fa-home mr-2"></i> Bosh sahifa
        </a>
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="text-2xl font-bold italic">53-maktab Marafon - 15.05.2026</h1>
            <p class="text-indigo-100 text-sm">Guruhlar uchun harakatlanish tizimi</p>
        </div>
    </header>

    <div class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex overflow-x-auto p-2 gap-2">
            <button onclick="showTab('stations', this)" class="nav-btn active-btn px-4 py-2 text-sm font-medium border rounded-lg whitespace-nowrap">
                <i class="fas fa-map-marker-alt mr-2"></i>Stansiyalar
            </button>
            <button onclick="showTab('class-view', this)" class="nav-btn px-4 py-2 text-sm font-medium border rounded-lg whitespace-nowrap">
                <i class="fas fa-users mr-2"></i>Sinflar kesimida
            </button>
            <button onclick="showTab('admin', this)" class="nav-btn px-4 py-2 text-sm font-medium border rounded-lg whitespace-nowrap">
                <i class="fas fa-th mr-2"></i>Umumiy Jadval
            </button>
            <button onclick="showTab('location', this)" class="nav-btn px-4 py-2 text-sm font-medium border rounded-lg whitespace-nowrap">
                <i class="fas fa-map-marked-alt mr-2"></i>Stansiyalar joylashuvi
            </button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 sm:p-6">
        
        <div id="stations" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="stations-list"></div>
        </div>

        <div id="class-view" class="tab-content bg-white p-6 rounded-xl shadow-sm border">
            <h2 class="text-xl font-bold mb-4 text-indigo-800 italic">Sinfingizni tanlang</h2>
            <select id="class-select" onchange="renderClassSchedule()" class="w-full p-3 border rounded-lg mb-6 bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
            </select>
            <div id="class-result" class="space-y-3"></div>
        </div>

        <div id="admin" class="tab-content overflow-x-auto bg-white p-4 rounded-xl shadow-sm border">
            <h2 class="text-xl font-bold mb-4 text-indigo-800 text-center uppercase text-sm">Umumiy Harakatlanish Matritsasi</h2>
            <table class="w-full text-[11px]">
                <thead id="admin-head"></thead>
                <tbody id="admin-body"></tbody>
            </table>
        </div>

        <div id="location" class="tab-content bg-white p-6 rounded-xl shadow-sm border text-center">
            <h2 class="text-xl font-bold mb-4 text-indigo-800">Maktab binosi va stansiyalar</h2>
            <div class="inline-block border-4 border-slate-100 rounded-2xl overflow-hidden shadow-xl">
                <img src="stansiyalar.jpg" alt="Stansiyalar joylashuvi" class="max-w-full h-auto">
            </div>
            <p class="text-slate-500 text-xs mt-4 italic">Agar rasm ko'rinmasa, fayl nomi 'stansiyalar.jpg' ekanligini tekshiring.</p>
        </div>

    </main>

    <script>
        const stations = [
            { id: 1, name: "Matematika", hero: "Al-Xorazmiy" },
            { id: 2, name: "Fizika", hero: "Albert Einstein" },
            { id: 3, name: "Kimyo", hero: "Dmitriy Mendeleyev" },
            { id: 4, name: "Biologiya", hero: "Ibn Sino" },
            { id: 5, name: "Informatika", hero: "Alan Turing" },
            { id: 6, name: "Tarix", hero: "Amir Temur" },
            { id: 7, name: "Qozoq tili", hero: "Abay Qo'nonboyev" },
            { id: 8, name: "O'zbek tili", hero: "Alisher Navoiy" },
            { id: 9, name: "Rus tili", hero: "Aleksandr Pushkin" },
            { id: 10, name: "Ingliz tili", hero: "William Shakespeare" }
        ];

        const classes = ["7-A", "7-B", "8-A", "8-B", "9-A", "9-B", "10-A", "10-B", "11-A", "11-B"];
        const times = [
            "10:30 - 10:40", "10:45 - 10:55", "11:00 - 11:10", "11:15 - 11:25", "11:30 - 11:40",
            "11:45 - 11:55", "12:00 - 12:10", "12:15 - 12:25", "12:30 - 12:40", "12:45 - 12:55"
        ];

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active-btn');
        }

        function init() {
            // Stansiyalar ro'yxati
            const list = document.getElementById('stations-list');
            stations.forEach(s => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border-l-4 border-indigo-500 shadow-sm flex items-center gap-3">
                        <div class="bg-indigo-50 text-indigo-600 font-bold w-10 h-10 flex items-center justify-center rounded-lg">S${s.id}</div>
                        <div>
                            <h3 class="font-bold text-slate-800">${s.name}</h3>
                            <p class="text-xs text-slate-500">${s.hero}</p>
                        </div>
                    </div>`;
            });

            // Sinf tanlash
            const select = document.getElementById('class-select');
            select.innerHTML = '<option value="">Tanlang...</option>';
            classes.forEach((c, idx) => {
                select.innerHTML += `<option value="${idx}">${c} sinfi</option>`;
            });

            // Admin jadvalini qurish
            let head = '<tr><th>Rund</th><th>Vaqt</th>';
            stations.forEach(s => head += `<th>S${s.id}</th>`);
            head += '</tr>';
            document.getElementById('admin-head').innerHTML = head;

            let body = '';
            for (let r = 0; r < 10; r++) {
                body += `<tr><td class="font-bold bg-slate-50">${r+1}</td><td class="whitespace-nowrap">${times[r]}</td>`;
                for (let sIdx = 0; sIdx < 10; sIdx++) {
                    const cIdx = (sIdx - r + 10) % 10;
                    body += `<td>${classes[cIdx]}</td>`;
                }
                body += '</tr>';
            }
            document.getElementById('admin-body').innerHTML = body;
        }

        function renderClassSchedule() {
            const cIdx = document.getElementById('class-select').value;
            const res = document.getElementById('class-result');
            if (cIdx === "") { res.innerHTML = ""; return; }
            
            let html = '';
            for (let r = 0; r < 10; r++) {
                const sIdx = (parseInt(cIdx) + r) % 10;
                const s = stations[sIdx];
                html += `
                    <div class="p-4 border rounded-lg bg-slate-50 flex items-center justify-between shadow-sm">
                        <div>
                            <span class="text-[10px] font-bold text-indigo-500 uppercase">Rund ${r+1}</span>
                            <div class="text-sm font-semibold">${times[r]}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-indigo-800">${s.name}</div>
                            <div class="text-xs text-slate-400">S${s.id} (${s.hero})</div>
                        </div>
                    </div>`;
            }
            res.innerHTML = html;
        }

        window.onload = init;
    </script>
</body>
</html>
